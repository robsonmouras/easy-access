    <title>Easy Access - Gerenciador de Credenciais</title>
    <script>
      // Restaura rota SPA redirecionada pelo 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var p = new URLSearchParams(location.search).get('p');
        if (p) {
          history.replaceState(null, null,
            location.pathname.split('/').slice(0, 2).join('/') + p +
            (location.search.slice(1).replace(/^p=.*?(&|$)/,'').replace(/~and~/g,'&') ? '?' : '') +
            location.search.slice(1).replace(/^p=.*?(&|$)/,'').replace(/~and~/g,'&') +
            location.hash
          );
        }
      })();
    </script>
